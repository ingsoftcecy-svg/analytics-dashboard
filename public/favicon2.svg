<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente para el fondo azul marino -->
    <linearGradient id="navyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Sombra suave para la tarjeta interna -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base Principal (Icono de App) -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#navyBg)"/>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="#334155" stroke-width="4"/>

  <!-- Panel Blanco Principal -->
  <rect x="80" y="80" width="352" height="352" rx="28" fill="#FFFFFF" filter="url(#dropShadow)"/>

  <!-- Cabecera del Dashboard (Azul Marino) -->
  <path d="M 80 108 C 80 92.5 92.5 80 108 80 L 404 80 C 419.5 80 432 92.5 432 108 L 432 136 L 80 136 Z" fill="#0F172A"/>

  <!-- Botones/Controles de la cabecera -->
  <circle cx="112" cy="108" r="6" fill="#FBBF24"/>
  <circle cx="132" cy="108" r="6" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="152" cy="108" r="6" fill="#FFFFFF" opacity="0.4"/>

  <!-- Módulo 1: Gráfico de Barras -->
  <rect x="108" y="160" width="180" height="144" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <!-- Barras -->
  <rect x="128" y="230" width="20" height="54" rx="6" fill="#0F172A"/>
  <rect x="158" y="200" width="20" height="84" rx="6" fill="#0F172A"/>
  <rect x="188" y="240" width="20" height="44" rx="6" fill="#0F172A"/>
  <rect x="218" y="180" width="20" height="104" rx="6" fill="#FBBF24"/> <!-- Barra Destacada -->
  <rect x="248" y="210" width="20" height="74" rx="6" fill="#0F172A"/>

  <!-- Módulo 2: Gráfico Circular / KPI -->
  <rect x="304" y="160" width="100" height="144" rx="16" fill="#0F172A"/>
  <!-- Anillo circular -->
  <circle cx="354" cy="222" r="30" fill="none" stroke="#334155" stroke-width="10"/>
  <circle cx="354" cy="222" r="30" fill="none" stroke="#FBBF24" stroke-width="10" stroke-dasharray="188" stroke-dashoffset="50" stroke-linecap="round"/>
  <!-- Porcentaje -->
  <text x="354" y="227" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#FFFFFF" text-anchor="middle">75%</text>

  <!-- Módulo 3: Gráfico de Tendencia Inferior -->
  <rect x="108" y="320" width="296" height="80" rx="16" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Línea de tendencia -->
  <path d="M 128 370 L 178 350 L 228 360 L 288 338 L 338 344 L 382 332" fill="none" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 128 370 L 178 350 L 228 360 L 288 338 L 338 344 L 382 332" fill="none" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 8"/>
  
  <!-- Puntos de la tendencia -->
  <circle cx="288" cy="338" r="5" fill="#FBBF24" stroke="#0F172A" stroke-width="2"/>
  <circle cx="382" cy="332" r="6" fill="#FBBF24" stroke="#0F172A" stroke-width="2"/>
</svg>
